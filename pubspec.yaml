name: sahem
description: Context-Aware Recipe Discovery App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Local Storage
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.3.3
  dio_cache_interceptor: ^3.4.4

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Notifications
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0

  # UI Utilities
  cached_network_image: ^3.3.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Functional Programming
  dartz: ^0.10.1

  # Routing
  go_router: ^12.1.1

  # Reactive Extensions
  rxdart: ^0.27.7

  # Google Fonts
  google_fonts: ^6.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.1
  bloc_test: ^9.1.5
  flutter_lints: ^3.0.0
